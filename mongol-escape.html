<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mongol Escape</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0d1117;
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    touch-action: none;
    user-select: none;
  }
  #gameContainer {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    background: linear-gradient(#7ec8e3 0%, #cfe8c9 55%, #d9c98a 100%);
    max-width: 100%;
    max-height: 100%;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #fff5e0;
    background: radial-gradient(ellipse at center, rgba(30,15,5,0.85) 0%, rgba(10,5,0,0.95) 100%);
    z-index: 10;
  }
  .hidden { display: none !important; }
  h1 {
    font-size: clamp(28px, 6vw, 52px);
    color: #ffd166;
    text-shadow: 3px 3px 0 #7a2e0e, 0 0 20px rgba(255,150,50,0.5);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: clamp(12px, 2.2vw, 16px);
    color: #e8c99a;
    margin-bottom: 24px;
    max-width: 320px;
    line-height: 1.5;
  }
  .btn {
    background: linear-gradient(#e8a13a, #b5641a);
    border: 3px solid #ffd166;
    color: #2b1400;
    font-weight: bold;
    font-size: clamp(16px, 3vw, 22px);
    padding: 12px 36px;
    border-radius: 40px;
    cursor: pointer;
    box-shadow: 0 6px 0 #7a3d0e, 0 8px 15px rgba(0,0,0,0.4);
    transition: transform 0.08s ease;
    margin-top: 10px;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #7a3d0e; }
  .controls-hint {
    margin-top: 26px;
    font-size: clamp(11px, 1.8vw, 14px);
    color: #cbb28a;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 360px;
  }
  .controls-hint span { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .key {
    background: #3a2412;
    border: 2px solid #8a5a2a;
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 14px;
    color: #ffd166;
  }
  #hud {
    position: absolute;
    top: 12px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
    color: #fff;
    z-index: 5;
    pointer-events: none;
    font-weight: bold;
  }
  .hud-box {
    background: rgba(20,10,0,0.55);
    border: 2px solid rgba(255,209,102,0.6);
    border-radius: 12px;
    padding: 6px 14px;
    font-size: clamp(14px, 2.5vw, 20px);
    display: flex;
    align-items: center;
    gap: 6px;
    color: #ffe8b8;
  }
  .coin-icon {
    width: 16px; height: 16px;
    background: radial-gradient(circle at 35% 35%, #fff2b0, #d4a017 70%, #8a6a00);
    border-radius: 50%;
    display: inline-block;
  }
  #danger-flash {
    position: absolute; inset: 0;
    background: rgba(200, 20, 20, 0.0);
    pointer-events: none;
    z-index: 4;
    transition: background 0.15s ease;
  }
  .final-stats {
    display: flex;
    gap: 24px;
    margin-bottom: 10px;
    font-size: clamp(14px, 2.5vw, 18px);
    color: #ffe8b8;
  }
  .stat-val { color: #ffd166; font-weight: bold; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="game" width="480" height="800"></canvas>

  <div id="hud" class="hidden">
    <div class="hud-box">🏃 <span id="scoreDisplay">0</span> m</div>
    <div class="hud-box"><span class="coin-icon"></span> <span id="coinDisplay">0</span></div>
  </div>
  <div id="danger-flash"></div>

  <div id="startScreen" class="overlay">
    <h1>MONGOL ESCAPE</h1>
    <div class="subtitle">The Khan's riders are on your trail! Dodge, jump, and slide across the steppe to outrun them.</div>
    <button class="btn" id="startBtn">START RUNNING</button>
    <div class="controls-hint">
      <span><span class="key">←→</span>Switch Lane</span>
      <span><span class="key">↑</span>Jump</span>
      <span><span class="key">↓</span>Slide</span>
      <span><span class="key">Swipe</span>on mobile</span>
    </div>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
    <h1>CAUGHT!</h1>
    <div class="subtitle" id="gameOverMsg">The warrior's lasso got you.</div>
    <div class="final-stats">
      <div>Distance: <span class="stat-val" id="finalScore">0</span>m</div>
      <div>Coins: <span class="stat-val" id="finalCoins">0</span></div>
    </div>
    <div class="subtitle" id="bestMsg" style="margin-bottom:0;"></div>
    <button class="btn" id="restartBtn">RUN AGAIN</button>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const LANES = [W/2 - 140, W/2, W/2 + 140];
  const GROUND_Y = H - 140;

  const startScreen = document.getElementById('startScreen');
  const gameOverScreen = document.getElementById('gameOverScreen');
  const hud = document.getElementById('hud');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const coinDisplay = document.getElementById('coinDisplay');
  const finalScoreEl = document.getElementById('finalScore');
  const finalCoinsEl = document.getElementById('finalCoins');
  const bestMsgEl = document.getElementById('bestMsg');
  const dangerFlash = document.getElementById('danger-flash');
  const gameOverMsg = document.getElementById('gameOverMsg');

  let bestScore = 0;
  try { bestScore = parseInt(localStorage_fallback()) || 0; } catch(e) { bestScore = 0; }
  // NOTE: localStorage not used per artifact restrictions; keep best score in-memory only.
  let sessionBest = 0;
  function localStorage_fallback(){ return 0; }

  // ---------- Game State ----------
  let state = 'menu'; // menu, playing, gameover
  let player, chaser, obstacles, coins, particles;
  let distance, coinCount, speed, baseSpeed, elapsed;
  let laneIndex = 1;
  let shieldTime = 0;
  let boostTime = 0;
  let hitFlashTime = 0;
  let spawnTimer = 0;
  let nextSpawnAt = 0;
  let lastTime = 0;
  let heat = 0; // how close chaser is (0 = far, 1 = catches you)
  let strikes = 0;
  const MAX_STRIKES = 3;

  function resetGame() {
    player = {
      lane: 1,
      x: LANES[1],
      y: GROUND_Y,
      w: 46, h: 70,
      vy: 0,
      jumping: false,
      sliding: false,
      slideTimer: 0,
      runFrame: 0
    };
    chaser = { x: LANES[1] - 90, wobble: 0 };
    obstacles = [];
    coins = [];
    particles = [];
    distance = 0;
    coinCount = 0;
    baseSpeed = 6.2;
    speed = baseSpeed;
    elapsed = 0;
    laneIndex = 1;
    shieldTime = 0;
    boostTime = 0;
    hitFlashTime = 0;
    spawnTimer = 0;
    nextSpawnAt = 40;
    heat = 0.15;
    strikes = 0;
  }

  // ---------- Input ----------
  let touchStartX = null, touchStartY = null;

  function moveLane(dir) {
    if (state !== 'playing') return;
    const newLane = laneIndex + dir;
    if (newLane >= 0 && newLane <= 2) {
      laneIndex = newLane;
    }
  }

  function doJump() {
    if (state !== 'playing') return;
    if (!player.jumping && !player.sliding) {
      player.jumping = true;
      player.vy = -17;
    }
  }

  function doSlide() {
    if (state !== 'playing') return;
    if (!player.jumping && !player.sliding) {
      player.sliding = true;
      player.slideTimer = 32;
    }
  }

  window.addEventListener('keydown', (e) => {
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
    if (e.key === 'ArrowLeft') moveLane(-1);
    else if (e.key === 'ArrowRight') moveLane(1);
    else if (e.key === 'ArrowUp' || e.key === ' ') doJump();
    else if (e.key === 'ArrowDown') doSlide();
  }, { passive: false });

  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY;
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (Math.abs(dx) > 30) moveLane(dx > 0 ? 1 : -1);
    } else {
      if (dy < -30) doJump();
      else if (dy > 30) doSlide();
    }
    touchStartX = null; touchStartY = null;
  }, { passive: true });

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);

  function startGame() {
    resetGame();
    state = 'playing';
    startScreen.classList.add('hidden');
    gameOverScreen.classList.add('hidden');
    hud.classList.remove('hidden');
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

  function endGame(reason) {
    state = 'gameover';
    hud.classList.add('hidden');
    gameOverMsg.textContent = reason;
    finalScoreEl.textContent = Math.floor(distance);
    finalCoinsEl.textContent = coinCount;
    if (Math.floor(distance) > sessionBest) {
      sessionBest = Math.floor(distance);
      bestMsgEl.textContent = '🏆 New best distance this session!';
    } else {
      bestMsgEl.textContent = 'Best this session: ' + sessionBest + 'm';
    }
    gameOverScreen.classList.remove('hidden');
  }

  // ---------- Obstacle / Coin spawning ----------
  const OBSTACLE_TYPES = ['cart', 'log', 'gate', 'arrow', 'fire'];

  function spawnWave() {
    const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
    const lanesToUse = [0,1,2];
    // shuffle
    for (let i = lanesToUse.length -1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [lanesToUse[i], lanesToUse[j]] = [lanesToUse[j], lanesToUse[i]];
    }
    let numBlocked = 1;
    if (Math.random() < 0.3 && distance > 200) numBlocked = 2;
    const blockedLanes = lanesToUse.slice(0, numBlocked);

    blockedLanes.forEach(lane => {
      let obType = type;
      if (Math.random() < 0.25) {
        obType = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
      }
      obstacles.push({
        lane: lane,
        type: obType,
        y: -100,
        passed: false,
        w: 70, h: obType === 'gate' ? 60 : (obType === 'arrow' ? 30 : 60)
      });
    });

    // maybe spawn coins in an open lane in an arc
    const openLanes = [0,1,2].filter(l => !blockedLanes.includes(l));
    if (openLanes.length && Math.random() < 0.8) {
      const coinLane = openLanes[Math.floor(Math.random()*openLanes.length)];
      const coinCountInRow = 4 + Math.floor(Math.random()*4);
      for (let i = 0; i < coinCountInRow; i++) {
        coins.push({
          lane: coinLane,
          y: -100 - i * 34,
          taken: false,
          special: Math.random() < 0.08
        });
      }
    }

    // rare power-up (shield)
    if (Math.random() < 0.06 && distance > 150) {
      const puLane = openLanes.length ? openLanes[Math.floor(Math.random()*openLanes.length)] : Math.floor(Math.random()*3);
      obstacles.push({ lane: puLane, type: 'shieldPU', y: -150, passed: false, w: 44, h: 44 });
    }
    if (Math.random() < 0.05 && distance > 300) {
      const puLane = openLanes.length ? openLanes[Math.floor(Math.random()*openLanes.length)] : Math.floor(Math.random()*3);
      obstacles.push({ lane: puLane, type: 'boostPU', y: -150, passed: false, w: 44, h: 44 });
    }
  }

  // ---------- Update ----------
  function update(dt) {
    elapsed += dt;
    const speedRamp = Math.min(1, elapsed / 90000); // ramps over ~90s
    speed = baseSpeed + speedRamp * 7 + (boostTime > 0 ? 6 : 0);
    distance += speed * dt * 0.06;

    // smooth lane movement
    const targetX = LANES[laneIndex];
    player.x += (targetX - player.x) * Math.min(1, dt * 0.012);

    // jump physics
    if (player.jumping) {
      player.y += player.vy * dt * 0.06;
      player.vy += 0.9 * dt * 0.06;
      if (player.y >= GROUND_Y) {
        player.y = GROUND_Y;
        player.jumping = false;
        player.vy = 0;
      }
    }
    // slide timer
    if (player.sliding) {
      player.slideTimer -= dt * 0.06;
      if (player.slideTimer <= 0) player.sliding = false;
    }

    if (shieldTime > 0) shieldTime -= dt;
    if (boostTime > 0) boostTime -= dt;
    if (hitFlashTime > 0) hitFlashTime -= dt;

    player.runFrame += dt * 0.02;

    // spawn logic based on distance traveled in px terms
    spawnTimer += speed * dt * 0.06;
    if (spawnTimer >= nextSpawnAt) {
      spawnTimer = 0;
      nextSpawnAt = 90 + Math.random() * 60 - Math.min(40, speedRamp * 40);
      spawnWave();
    }

    // move obstacles/coins
    const moveAmt = speed * dt * 0.09;
    obstacles.forEach(o => o.y += moveAmt);
    coins.forEach(c => c.y += moveAmt);
    particles.forEach(p => { p.y += moveAmt; p.life -= dt; });
    particles = particles.filter(p => p.life > 0);

    // chaser heat: increases with strikes, decreases slowly if clean running
    heat += (dt * 0.000045);
    heat = Math.min(heat, 0.98);
    chaser.wobble += dt * 0.01;

    // collision: obstacles
    for (let o of obstacles) {
      if (o.passed) continue;
      if (o.y > GROUND_Y - 20 && o.y < GROUND_Y + 40 && o.lane === laneIndex) {
        if (o.type === 'shieldPU') {
          o.passed = true;
          shieldTime = 5000;
          spawnParticles(player.x, player.y - 40, '#5ec8ff');
          continue;
        }
        if (o.type === 'boostPU') {
          o.passed = true;
          boostTime = 3500;
          spawnParticles(player.x, player.y - 40, '#ffd166');
          continue;
        }
        const playerTop = player.y - player.h + (player.sliding ? 34 : 0);
        const playerBottom = player.y;
        let hit = false;
        if (o.type === 'arrow') {
          // arrow is mid-height; must slide to avoid
          hit = !player.sliding;
        } else if (o.type === 'gate') {
          // gate is low; must slide
          hit = !player.sliding;
        } else {
          // cart, log, fire: must jump
          hit = !player.jumping || player.y > GROUND_Y - 30;
        }
        if (hit) {
          o.passed = true;
          if (shieldTime > 0) {
            spawnParticles(player.x, player.y - 40, '#5ec8ff');
          } else {
            registerHit();
          }
        } else {
          o.passed = true;
        }
      }
    }

    // collision: coins
    for (let c of coins) {
      if (c.taken) continue;
      if (c.y > GROUND_Y - 60 && c.y < GROUND_Y + 20 && c.lane === laneIndex) {
        const isLow = player.sliding;
        // coins are collectible regardless mostly (float chest height), simple pickup
        c.taken = true;
        coinCount += c.special ? 5 : 1;
        distance += c.special ? 3 : 0;
        spawnParticles(LANES[c.lane], c.y, c.special ? '#ff9f1c' : '#ffd166');
      }
    }

    obstacles = obstacles.filter(o => o.y < H + 100 && !(o.passed && (o.type==='shieldPU'||o.type==='boostPU')));
    obstacles = obstacles.filter(o => o.y < H + 100);
    coins = coins.filter(c => c.y < H + 60 && !c.taken);

    scoreDisplay.textContent = Math.floor(distance);
    coinDisplay.textContent = coinCount;

    if (heat >= 1 || strikes >= MAX_STRIKES) {
      endGame(strikes >= MAX_STRIKES ? "Too many hits — the warrior closed in!" : "The rider finally caught you!");
    }
  }

  function registerHit() {
    strikes += 1;
    heat = Math.min(1, heat + 0.28);
    hitFlashTime = 300;
    dangerFlash.style.background = 'rgba(200,20,20,0.45)';
    setTimeout(() => { dangerFlash.style.background = 'rgba(200,20,20,0)'; }, 200);
  }

  function spawnParticles(x, y, color) {
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: x + (Math.random()-0.5)*20,
        y: y + (Math.random()-0.5)*20,
        vx: (Math.random()-0.5)*3,
        vy: -Math.random()*3,
        life: 400 + Math.random()*200,
        color
      });
    }
  }

  // ---------- Draw ----------
  function drawBackground() {
    // sky gradient handled by CSS; draw distant mountains + ground
    ctx.fillStyle = '#c9b567';
    ctx.fillRect(0, GROUND_Y + 60, W, H - GROUND_Y - 60);

    // distant hills
    ctx.fillStyle = 'rgba(120,150,90,0.5)';
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y + 20);
    for (let i = 0; i <= W; i += 60) {
      ctx.lineTo(i, GROUND_Y + 20 - Math.sin((i + elapsed*0.02) * 0.01) * 18);
    }
    ctx.lineTo(W, GROUND_Y + 60);
    ctx.lineTo(0, GROUND_Y + 60);
    ctx.fill();

    // track
    ctx.fillStyle = '#b8935a';
    ctx.fillRect(LANES[0] - 90, GROUND_Y + 40, 360, H - GROUND_Y);
    // lane dividers (scrolling)
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 4;
    ctx.setLineDash([26, 24]);
    const offset = (elapsed * speed * 0.09) % 50;
    for (let lx of [LANES[0]+70, LANES[1]+70]) {
      ctx.beginPath();
      ctx.moveTo(lx, GROUND_Y + 40 - offset);
      ctx.lineTo(lx, H);
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function drawYurts() {
    // small decorative yurts in background, fixed-ish parallax
    const t = (elapsed * 0.01) % 400;
    for (let i = 0; i < 3; i++) {
      const x = ((i * 220) - t) % (W + 200) - 100;
      const y = GROUND_Y - 40;
      ctx.fillStyle = '#e8d8b0';
      ctx.beginPath();
      ctx.ellipse(x, y, 26, 20, 0, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#8a5a2a';
      ctx.beginPath();
      ctx.moveTo(x-26, y);
      ctx.lineTo(x+26, y);
      ctx.lineTo(x, y-34);
      ctx.closePath();
      ctx.fill();
    }
  }

  function drawChaser() {
    // draws behind player, size/position reflects heat (closeness)
    const closeness = heat;
    const cx = player.x - 10;
    const cy = GROUND_Y - closeness * 40 + Math.sin(chaser.wobble)*4;
    const scale = 0.7 + closeness * 0.5;
    ctx.save();
    ctx.translate(cx, cy + 130 - closeness*70);
    ctx.scale(scale, scale);
    // horse body
    ctx.fillStyle = '#5a3d2a';
    ctx.beginPath();
    ctx.ellipse(0, 0, 42, 20, 0, 0, Math.PI*2);
    ctx.fill();
    // horse head
    ctx.beginPath();
    ctx.ellipse(-40, -8, 14, 10, -0.3, 0, Math.PI*2);
    ctx.fill();
    // legs
    ctx.strokeStyle = '#3d2a1a';
    ctx.lineWidth = 6;
    const legPhase = Math.sin(elapsed*0.02)*10;
    ctx.beginPath();
    ctx.moveTo(-20, 14); ctx.lineTo(-20+legPhase, 34);
    ctx.moveTo(20, 14); ctx.lineTo(20-legPhase, 34);
    ctx.stroke();
    // rider
    ctx.fillStyle = '#7a1f1f';
    ctx.beginPath();
    ctx.ellipse(0, -30, 12, 18, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#e0b088';
    ctx.beginPath();
    ctx.arc(0, -48, 9, 0, Math.PI*2);
    ctx.fill();
    // pointed hat
    ctx.fillStyle = '#3a2412';
    ctx.beginPath();
    ctx.moveTo(-9, -54);
    ctx.lineTo(9, -54);
    ctx.lineTo(0, -70);
    ctx.closePath();
    ctx.fill();
    // bow arm
    ctx.strokeStyle = '#3a2412';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(14, -32, 12, -0.8, 0.8);
    ctx.stroke();
    ctx.restore();
  }

  function drawPlayer() {
    const px = player.x;
    let py = player.y;
    ctx.save();
    ctx.translate(px, py);

    const bob = player.jumping || player.sliding ? 0 : Math.sin(player.runFrame) * 4;

    if (shieldTime > 0) {
      ctx.save();
      ctx.globalAlpha = 0.4 + Math.sin(elapsed*0.01)*0.15;
      ctx.strokeStyle = '#5ec8ff';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(0, -35 - bob, 42, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }

    if (player.sliding) {
      // sliding pose: low horizontal
      ctx.fillStyle = '#3f6b8a';
      ctx.beginPath();
      ctx.ellipse(0, -14, 30, 14, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#e0b088';
      ctx.beginPath();
      ctx.arc(20, -18, 9, 0, Math.PI*2);
      ctx.fill();
    } else {
      // body
      ctx.fillStyle = '#3f6b8a';
      ctx.beginPath();
      ctx.ellipse(0, -40 - bob, 15, 24, 0, 0, Math.PI*2);
      ctx.fill();
      // legs (running)
      ctx.strokeStyle = '#26405a';
      ctx.lineWidth = 7;
      const legSwing = player.jumping ? 8 : Math.sin(player.runFrame*2)*14;
      ctx.beginPath();
      ctx.moveTo(-6, -18-bob); ctx.lineTo(-6+legSwing, 4-bob);
      ctx.moveTo(6, -18-bob); ctx.lineTo(6-legSwing, 4-bob);
      ctx.stroke();
      // arms
      ctx.strokeStyle = '#e0b088';
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(-10, -50-bob); ctx.lineTo(-10-legSwing*0.6, -30-bob);
      ctx.moveTo(10, -50-bob); ctx.lineTo(10+legSwing*0.6, -30-bob);
      ctx.stroke();
      // head
      ctx.fillStyle = '#e0b088';
      ctx.beginPath();
      ctx.arc(0, -66-bob, 11, 0, Math.PI*2);
      ctx.fill();
      // headband
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(-11, -70-bob, 22, 5);
    }
    ctx.restore();
  }

  function drawObstacle(o) {
    const x = LANES[o.lane];
    const y = o.y;
    ctx.save();
    ctx.translate(x, y);
    switch (o.type) {
      case 'cart':
        ctx.fillStyle = '#6b4423';
        ctx.fillRect(-32, -34, 64, 34);
        ctx.strokeStyle = '#3a2412';
        ctx.lineWidth = 3;
        ctx.strokeRect(-32, -34, 64, 34);
        ctx.fillStyle = '#2b1a0d';
        ctx.beginPath(); ctx.arc(-20, 0, 9, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(20, 0, 9, 0, Math.PI*2); ctx.fill();
        break;
      case 'log':
        ctx.fillStyle = '#7a5230';
        ctx.beginPath();
        ctx.ellipse(0, -14, 40, 16, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.strokeStyle = '#4a2f18';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.ellipse(0,-14,40,16,0,0,Math.PI*2); ctx.stroke();
        break;
      case 'gate':
        ctx.fillStyle = '#8a5a2a';
        ctx.fillRect(-36, -60, 8, 60);
        ctx.fillRect(28, -60, 8, 60);
        ctx.fillStyle = '#c0392b';
        ctx.fillRect(-40, -66, 80, 12);
        ctx.fillStyle = '#ffd166';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('⚔', 0, -56);
        break;
      case 'arrow':
        ctx.strokeStyle = '#5a3d2a';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-40, -30); ctx.lineTo(40, -30);
        ctx.stroke();
        ctx.fillStyle = '#2b1a0d';
        ctx.beginPath();
        ctx.moveTo(40, -30); ctx.lineTo(28, -36); ctx.lineTo(28, -24);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#c0392b';
        ctx.beginPath();
        ctx.moveTo(-40,-30); ctx.lineTo(-30,-34); ctx.lineTo(-30,-26);
        ctx.closePath(); ctx.fill();
        break;
      case 'fire':
        ctx.fillStyle = '#e8622a';
        ctx.beginPath();
        ctx.ellipse(0,-20,14,26,0,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffd166';
        ctx.beginPath();
        ctx.ellipse(0,-16,7,14,0,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#3a2412';
        ctx.fillRect(-18,-4,36,8);
        break;
      case 'shieldPU':
        ctx.fillStyle = 'rgba(94,200,255,0.25)';
        ctx.beginPath(); ctx.arc(0,-30,26,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#5ec8ff';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0,-30,20,0,Math.PI*2); ctx.stroke();
        ctx.fillStyle = '#5ec8ff';
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('🛡', 0, -24);
        break;
      case 'boostPU':
        ctx.fillStyle = 'rgba(255,209,102,0.25)';
        ctx.beginPath(); ctx.arc(0,-30,26,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#ffd166';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(0,-30,20,0,Math.PI*2); ctx.stroke();
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('⚡', 0, -24);
        break;
    }
    ctx.restore();
  }

  function drawCoin(c) {
    const x = LANES[c.lane];
    const y = c.y - 30;
    ctx.save();
    ctx.translate(x, y);
    const bob = Math.sin(elapsed*0.006 + c.y*0.05)*4;
    ctx.translate(0, bob);
    const grad = ctx.createRadialGradient(-3,-3,2,0,0,c.special ? 16 : 11);
    if (c.special) {
      grad.addColorStop(0, '#fff2c0');
      grad.addColorStop(1, '#ff9f1c');
    } else {
      grad.addColorStop(0, '#fff2b0');
      grad.addColorStop(1, '#d4a017');
    }
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, c.special ? 15 : 11, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = c.special ? '#8a5300' : '#8a6a00';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life / 500);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 4, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawHeatMeter() {
    // small warning bar at top representing chaser closeness
    const barW = 160;
    const x = W/2 - barW/2, y = 14;
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = 'rgba(30,15,5,0.5)';
    ctx.fillRect(x-4, y-4, barW+8, 16);
    ctx.fillStyle = heat > 0.75 ? '#e74c3c' : (heat > 0.45 ? '#e8a13a' : '#6fbf5f');
    ctx.fillRect(x, y, barW * heat, 8);
    ctx.strokeStyle = '#ffd166';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x-4, y-4, barW+8, 16);
    ctx.restore();
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawYurts();
    drawChaser();

    // draw coins & obstacles sorted by y for correct order
    const drawables = [...coins.map(c=>({...c, kind:'coin'})), ...obstacles.map(o=>({...o, kind:'obstacle'}))];
    drawables.sort((a,b) => a.y - b.y);
    drawables.forEach(d => {
      if (d.kind === 'coin') drawCoin(d); else drawObstacle(d);
    });

    drawParticles();
    drawPlayer();
    if (state === 'playing') drawHeatMeter();
  }

  // ---------- Loop ----------
  function loop(now) {
    const dt = Math.min(33, now - lastTime);
    lastTime = now;
    if (state === 'playing') {
      update(dt);
    }
    render();
    if (state === 'playing') {
      requestAnimationFrame(loop);
    }
  }

  // idle render for menu background
  function idleRender() {
    resetGame();
    render();
  }
  idleRender();

})();
</script>
</body>
</html>
